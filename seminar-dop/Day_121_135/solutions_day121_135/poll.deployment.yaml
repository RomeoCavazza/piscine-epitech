apiVersion: apps/v1
kind: Deployment
metadata:
  name: poll
  namespace: default
  labels:
    app: poll
spec:
  replicas: 2
  # Rolling update zero-downtime : on crée un pod neuf AVANT de tuer l'ancien.
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: poll
  template:
    metadata:
      labels:
        app: poll
    spec:
      affinity:
        podAntiAffinity:
          # "required" : HA stricte, chaque replica sur un node distinct.
          # Suppose un node pool avec de la marge (nodes > replicas) pour le surge
          # en rolling update et le scale HPA. Sur un cluster <=2 nodes ou local
          # (minikube), lancer `scripts/soft-affinity.sh on` pour relâcher en
          # "preferred", sinon les pods en trop restent Pending.
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - poll
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: poll
          image: epitechcontent/t-dop-600-poll:k8s
          ports:
            - containerPort: 80
          resources:
            # requests.cpu est OBLIGATOIRE pour que le HPA puisse calculer
            # un pourcentage d'utilisation CPU.
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_HOST
      restartPolicy: Always
