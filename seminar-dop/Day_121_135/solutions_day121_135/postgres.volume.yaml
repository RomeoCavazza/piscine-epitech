# Stockage provisionné dynamiquement à la demande (pas de PersistentVolume
# statique). On NE fixe PAS storageClassName : le PVC prend la StorageClass par
# défaut du cluster — "do-block-storage" sur DOKS, "standard" sur minikube/kind,
# "gp3"/"standard-rwo" sur EKS/GKE. Manifest portable, comportement DOKS
# identique (do-block-storage y est déjà la SC par défaut).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
