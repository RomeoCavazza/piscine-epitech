Horizontal Pod Autoscaler for the result dashboard.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: result
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: result
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
