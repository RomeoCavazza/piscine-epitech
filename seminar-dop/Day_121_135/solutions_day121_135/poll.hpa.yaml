Horizontal Pod Autoscaler for the poll front-end.
# Requires metrics-server (DOKS ships it) and resources.requests.cpu on the
# poll deployment (already set). Scaling beyond 2 pods works because poll uses
# *preferred* (not required) pod anti-affinity.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: poll
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: poll
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
