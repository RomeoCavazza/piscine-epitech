PodDisruptionBudgets: keep at least 1 replica serving during
# voluntary disruptions (node drain, rolling update, eviction).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: poll
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: poll
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: result
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: result
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: traefik
  namespace: kube-public
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: traefik
