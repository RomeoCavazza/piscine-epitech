apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: kube-public
  labels:
    app: traefik
spec:
  replicas: 2
  # Rolling update zero-downtime de l'ingress controller lui-même.
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-ingress-controller
      affinity:
        podAntiAffinity:
          # "required" : HA stricte, chaque replica sur un node distinct.
          # Suppose un node pool avec de la marge pour le surge en rolling update.
          # Sur un cluster <=2 nodes ou local, lancer `scripts/soft-affinity.sh on`.
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - traefik
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: traefik
          image: traefik:2.7
          args:
            - --api.insecure=true
            - --ping=true
            - --providers.kubernetesingress=true
            - --entrypoints.web.address=:80
            - --entrypoints.traefik.address=:8080
          ports:
            - name: web
              containerPort: 80
            - name: dashboard
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          # --ping=true expose /ping sur l'entrypoint "traefik" (:8080).
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
      restartPolicy: Always
