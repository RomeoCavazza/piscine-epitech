services:
  # Backend (Rust/Axum)
  - type: web
    name: hello-world-backend
    env: rust
    buildCommand: cd backend && cargo build --release
    startCommand: cd backend && ./target/release/hello-world-backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hello-world-db
          property: connectionString
      - key: MONGODB_URL
        sync: false # Set manually (e.g. MongoDB Atlas)
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001

  # Frontend (Next.js)
  - type: web
    name: hello-world-frontend
    env: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: hello-world-backend
          property: host
      - key: NODE_VERSION
        value: 20

databases:
  # Managed PostgreSQL
  - name: hello-world-db
    plan: free
    databaseName: helloworld
    user: postgres
